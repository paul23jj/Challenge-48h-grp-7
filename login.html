<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUTHENTIFICATION // CHALLENGE-48H</title>
  <link rel="stylesheet" href="shared/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .crt-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }

    .login-wrap {
      width: 100%; max-width: 440px;
      padding: 0 1.5rem;
      position: relative; z-index: 1;
    }

    .login-card {
      border: 1px solid var(--color-primary);
      border-radius: 6px;
      background: rgba(0, 212, 255, 0.03);
      box-shadow: 0 0 40px rgba(0,212,255,0.1);
      overflow: hidden;
    }

    .login-titlebar {
      display: flex; align-items: center; gap: .4rem;
      padding: .55rem .9rem;
      background: rgba(0,212,255,0.06);
      border-bottom: 1px solid var(--color-border);
    }
    .tdot { width:10px;height:10px;border-radius:50%;display:inline-block; }
    .tdot-r{background:#ff5f57;} .tdot-y{background:#febc2e;} .tdot-g{background:#28c840;}
    .login-titlebar-title {
      margin-left:.4rem; font-size:.65rem;
      color:var(--color-text-dim); letter-spacing:.12em;
    }

    .login-body {
      padding: 2.5rem 2rem;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo h1 {
      font-size: 1rem;
      letter-spacing: .3em;
      color: var(--color-primary);
      text-transform: uppercase;
    }
    .login-logo p {
      font-size: .65rem;
      color: var(--color-text-dim);
      letter-spacing: .15em;
      margin-top: .3rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--color-text-dim);
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--color-border);
      border-radius: 3px;
      color: var(--color-text);
      font-family: var(--font-mono);
      font-size: .9rem;
      padding: .55rem .8rem;
      letter-spacing: .05em;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 10px rgba(0,212,255,0.15);
    }
    .form-group input.input-error {
      border-color: var(--color-danger);
      box-shadow: 0 0 10px rgba(255,50,50,0.2);
      animation: shake .3s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    .login-submit {
      width: 100%;
      margin-top: 1.5rem;
      padding: .7rem;
      background: transparent;
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
      font-family: var(--font-mono);
      font-size: .8rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background .2s, color .2s, box-shadow .2s;
    }
    .login-submit:hover {
      background: var(--color-primary);
      color: #000;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }

    .login-error {
      margin-top: 1rem;
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--color-danger);
      text-align: center;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity .2s;
    }
    .login-error.show { opacity: 1; }

    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: .65rem;
      color: var(--color-text-dim);
      letter-spacing: .1em;
    }
    .login-footer a {
      color: var(--color-text-dim);
      text-decoration: none;
    }
    .login-footer a:hover { color: var(--color-primary); }

    /* Scan line animation on submit */
    .login-card.scanning::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--color-primary);
      box-shadow: 0 0 12px var(--color-primary);
      animation: scan .6s linear;
      z-index: 10;
    }
    @keyframes scan { from{top:0} to{top:100%} }
  </style>
</head>
<body>
  <div class="crt-overlay" aria-hidden="true"></div>

  <div class="login-wrap">
    <div class="login-card" id="loginCard">
      <div class="login-titlebar">
        <span class="tdot tdot-r"></span>
        <span class="tdot tdot-y"></span>
        <span class="tdot tdot-g"></span>
        <span class="login-titlebar-title">ROOT@CHALLENGE-48H — AUTH_TERMINAL.exe</span>
      </div>
      <div class="login-body">
        <div class="login-logo">
          <h1>[ AUTHENTIFICATION ]</h1>
          <p>// ACCÈS SYSTÈME CLASSIFIÉ — NIVEAU 5 //</p>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="inp-login">LOGIN</label>
            <input type="text" id="inp-login" placeholder="identifiant_opérateur" spellcheck="false" />
          </div>
          <div class="form-group">
            <label for="inp-pass">PASSWORD</label>
            <input type="password" id="inp-pass" placeholder="••••••••••••" />
          </div>
          <button type="submit" class="login-submit">[ CONNEXION ]</button>
        </form>

        <div class="login-error" id="loginError">⚠ IDENTIFIANTS INCORRECTS — ACCÈS REFUSÉ</div>

        <div class="login-footer">
          <a href="index.html">◀ Retour au hub</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CORRECT_LOGIN = 'ynov26';
    const CORRECT_PASS  = 'ch@ll3nge_48h';

    const form     = document.getElementById('loginForm');
    const inpLogin = document.getElementById('inp-login');
    const inpPass  = document.getElementById('inp-pass');
    const errEl    = document.getElementById('loginError');
    const card     = document.getElementById('loginCard');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const login = inpLogin.value.trim();
      const pass  = inpPass.value;

      if (login === CORRECT_LOGIN && pass === CORRECT_PASS) {
        // Succès — animation puis redirection
        inpLogin.disabled = true;
        inpPass.disabled  = true;
        errEl.classList.remove('show');
        card.classList.add('scanning');
        setTimeout(() => { window.location.href = 'win.html'; }, 700);
      } else {
        // Échec
        errEl.classList.add('show');
        [inpLogin, inpPass].forEach(el => {
          el.classList.add('input-error');
          setTimeout(() => el.classList.remove('input-error'), 400);
        });
        inpPass.value = '';
        inpPass.focus();
      }
    });
  </script>
  <script>window.ARG_TIMER_HUB = 'index.html';</script>
  <script src="shared/global-timer.js"></script>
</body>
</html>
